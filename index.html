<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="NCore Game — صالة ألعاب النوستالجيا" />
  <meta property="og:title" content="NCore Game" />
  <meta property="og:description" content="صالة ألعاب بكسلية كلاسيكية" />
  <meta property="og:url" content="https://ncore-game.vercel.app/" />
  <title>NCore Game 🎮</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="loading-screen">
    <div class="loading-content">
      <h1 class="pixel-title">NCORE GAME</h1>
      <p class="pixel-subtitle" id="loading-label">جارِ تحميل صالة الألعاب...</p>
      <div class="loading-bar-wrapper">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loading-percent" id="loading-percent">0%</p>
    </div>
  </div>

  <div id="character-select-screen" class="hidden">
    <h2 class="pixel-title">اختر شخصيتك</h2>
    <div id="scroll-controls">
      <button id="scroll-up-btn" class="pixel-btn"><span class="pixel-arrow-up"></span></button>
      <button id="scroll-down-btn" class="pixel-btn"><span class="pixel-arrow-down"></span></button>
    </div>
    <div id="character-grid"></div>
    <button id="start-btn" class="pixel-btn hidden">ادخل الصالة !</button>
  </div>

  <div id="game-container" class="hidden">
    <canvas id="game-canvas"></canvas>

    <div id="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-thumb"></div>
      </div>
    </div>

    <!-- نظام التحكم بالألعاب (Gamepad) -->
    <div id="gamepad-zone" class="hidden">
      <!-- تمت إزالة أدوات التعديل من هنا ونقلها إلى شريط الحاسوب (device-header) -->

      <!-- عصا التحكم الخاصة بالألعاب (مختلفة عن عصا الصالة) -->
      <div id="gamepad-joystick-base" class="gamepad-joystick-draggable hidden" data-key="joystick">
        <div id="gamepad-joystick-thumb"></div>
      </div>

      <div id="dpad-container" class="gamepad-cluster">
        <button id="pad-up" class="virtual-btn dpad-btn hidden" data-key="ArrowUp">⬆</button>
        <button id="pad-left" class="virtual-btn dpad-btn hidden" data-key="ArrowLeft">⬅</button>
        <button id="pad-right" class="virtual-btn dpad-btn hidden" data-key="ArrowRight">➡</button>
        <button id="pad-down" class="virtual-btn dpad-btn hidden" data-key="ArrowDown">⬇</button>
      </div>

      <div id="action-container" class="gamepad-cluster">
        <button id="pad-a" class="virtual-btn action-btn hidden" data-key="a">A</button>
        <button id="pad-b" class="virtual-btn action-btn hidden" data-key="b">B</button>
        <button id="pad-c" class="virtual-btn action-btn hidden" data-key="c">C</button>
        <button id="pad-d" class="virtual-btn action-btn hidden" data-key="d">D</button>
        <button id="pad-e" class="virtual-btn action-btn hidden" data-key="e">E</button>
        <button id="pad-f" class="virtual-btn action-btn hidden" data-key="f">F</button>
        <button id="pad-g" class="virtual-btn action-btn hidden" data-key="g">G</button>
        <button id="pad-h" class="virtual-btn action-btn hidden" data-key="h">H</button>
        <button id="pad-i" class="virtual-btn action-btn hidden" data-key="i">I</button>
        <button id="pad-j" class="virtual-btn action-btn hidden" data-key="j">J</button>
        <button id="pad-k" class="virtual-btn action-btn hidden" data-key="k">K</button>
        <button id="pad-l" class="virtual-btn action-btn hidden" data-key="l">L</button>
        <button id="pad-m" class="virtual-btn action-btn hidden" data-key="m">M</button>
        <button id="pad-n" class="virtual-btn action-btn hidden" data-key="n">N</button>
        <button id="pad-o" class="virtual-btn action-btn hidden" data-key="o">O</button>
        <button id="pad-p" class="virtual-btn action-btn hidden" data-key="p">P</button>
        <button id="pad-q" class="virtual-btn action-btn hidden" data-key="q">Q</button>
        <button id="pad-r" class="virtual-btn action-btn hidden" data-key="r">R</button>
        <button id="pad-s" class="virtual-btn action-btn hidden" data-key="s">S</button>
        <button id="pad-t" class="virtual-btn action-btn hidden" data-key="t">T</button>
        <button id="pad-u" class="virtual-btn action-btn hidden" data-key="u">U</button>
        <button id="pad-v" class="virtual-btn action-btn hidden" data-key="v">V</button>
        <button id="pad-w" class="virtual-btn action-btn hidden" data-key="w">W</button>
        <button id="pad-x" class="virtual-btn action-btn hidden" data-key="x">X</button>
        <button id="pad-y" class="virtual-btn action-btn hidden" data-key="y">Y</button>
        <button id="pad-z" class="virtual-btn action-btn hidden" data-key="z">Z</button>

        <button id="pad-0" class="virtual-btn action-btn hidden" data-key="0">0</button>
        <button id="pad-1" class="virtual-btn action-btn hidden" data-key="1">1</button>
        <button id="pad-2" class="virtual-btn action-btn hidden" data-key="2">2</button>
        <button id="pad-3" class="virtual-btn action-btn hidden" data-key="3">3</button>
        <button id="pad-4" class="virtual-btn action-btn hidden" data-key="4">4</button>
        <button id="pad-5" class="virtual-btn action-btn hidden" data-key="5">5</button>
        <button id="pad-6" class="virtual-btn action-btn hidden" data-key="6">6</button>
        <button id="pad-7" class="virtual-btn action-btn hidden" data-key="7">7</button>
        <button id="pad-8" class="virtual-btn action-btn hidden" data-key="8">8</button>
        <button id="pad-9" class="virtual-btn action-btn hidden" data-key="9">9</button>

        <button id="pad-enter" class="virtual-btn action-btn special-btn hidden" data-key="Enter">ENT</button>
        <button id="pad-space" class="virtual-btn action-btn special-btn hidden" data-key=" ">SPC</button>
        <button id="pad-esc" class="virtual-btn action-btn special-btn hidden" data-key="Escape">ESC</button>
        <button id="pad-shift" class="virtual-btn action-btn special-btn hidden" data-key="Shift">SHF</button>
        <button id="pad-tab" class="virtual-btn action-btn special-btn hidden" data-key="Tab">TAB</button>
        <button id="pad-backspace" class="virtual-btn action-btn special-btn hidden" data-key="Backspace">DEL</button>
      </div>
    </div>

    <div id="hud">
      <span id="hud-character-name"></span>
      <span id="hud-players-count"></span>
    </div>

    <!-- زر التفاعل الجديد لفتح الحواسيب -->
    <button id="interact-btn" class="pixel-btn hidden" style="position: fixed; bottom: 74px; right: 24px; z-index: 40; background: var(--color-primary); box-shadow: 4px 4px 0 #a07000, inset -2px -2px 0 rgba(0,0,0,0.3), 0 0 15px rgba(240,192,64,0.6); animation: pulse 1.5s infinite;">🕹️ تفاعل</button>
    
    <button id="chat-action-btn" class="pixel-btn hidden">💬 تحدث</button>

    <div id="device-popup" class="hidden">
      <!-- تم نقل أزرار التعديل لتكون في المنتصف بين التكبير والإغلاق -->
      <div id="device-header" style="display: flex; gap: 8px; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 5px; z-index: 101;">
        <button id="device-fs-btn" class="pixel-btn" style="background: var(--color-secondary); padding: 8px 12px; font-size: 8px;">⛶ تكبير</button>
        
        <div id="gamepad-edit-tools" style="display: flex; gap: 5px; pointer-events: auto;">
          <button id="edit-layout-btn" class="pixel-btn" style="background: var(--color-primary); padding: 8px 10px; font-size: 8px;">تعديل 🛠️</button>
          <button id="save-layout-btn" class="pixel-btn hidden" style="background: var(--color-green); padding: 8px 10px; font-size: 8px;">حفظ ✅</button>
          <button id="reset-layout-btn" class="pixel-btn hidden" style="background: var(--color-accent); padding: 8px 10px; font-size: 8px;">🔄</button>
        </div>

        <button id="device-close-btn" class="pixel-btn" style="background: var(--color-accent); padding: 8px 12px; font-size: 8px;">✖ إغلاق</button>
      </div>
      
      <canvas id="device-canvas"></canvas>
      <iframe id="device-iframe" class="hidden" src="" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <div id="chat-modal" class="hidden">
    <div class="chat-box">
      <h3 class="pixel-subtitle" style="color: var(--color-primary);">محادثة قريبة</h3>
      <input type="text" id="chat-input" placeholder="اكتب رسالتك (أقصى 100 حرف)..." maxlength="100" dir="auto" />
      <div class="chat-actions">
        <button id="chat-send-btn" class="pixel-btn" style="background: var(--color-green);">إرسال</button>
        <button id="chat-close-btn" class="pixel-btn" style="background: var(--color-accent);">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const KEEP_ALIVE_URL      = 'https://ncore-mmo-server.onrender.com/ping';
    const KEEP_ALIVE_INTERVAL = 10 * 60 * 1000;
    function keepAlive() {
      fetch(KEEP_ALIVE_URL, { method: 'GET', cache: 'no-cache' })
        .then(() => console.log('[KeepAlive] ✅'))
        .catch(() => console.warn('[KeepAlive] السيرفر نائم، جارِ الإيقاظ...'));
    }
    keepAlive();
    setInterval(keepAlive, KEEP_ALIVE_INTERVAL);
  </script>

  <script src="js/utils.js"></script>
  <script src="js/collision.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/joystick.js"></script>
  <script src="js/map.js"></script>
  <script src="js/player.js"></script>
  <script src="js/npc.js"></script>
  <script src="js/games_data.js"></script>
  
  <script src="js/game_controls.js"></script>
  <script src="js/gamepad.js"></script>
  
  <script src="js/devices.js"></script>
  <script src="js/minigames.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/network.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
