<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>N-CORE MMO World</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/colyseus.js@0.15.0/dist/colyseus.js"></script>
</head>
<body>
    <div id="loading-screen">
        <h1 id="loading-title">جاري الاتصال بعالم N-CORE...</h1>
        <p id="loading-text">تهيئة الاتصال بالخادم المركزي...</p>
        <div class="spinner"></div>
    </div>
    
    <div id="landscape-warning">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="#66fcf1">
            <path d="M16 1H8C6.34 1 5 2.34 5 4V20C5 21.66 6.34 23 8 23H16C17.66 23 19 21.66 19 20V4C19 2.34 17.66 1 16 1ZM17 19H7V5H17V19Z"/>
            <path d="M12 21H12.01" stroke="#66fcf1" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2 style="margin-top:20px;">الرجاء تدوير الهاتف!</h2>
        <p>عالم N-CORE مصمم للعب بالوضع الأفقي فقط.</p>
    </div>
    
    <div id="ui-layer">
        <h1>N-CORE MMO</h1>
        <p id="location-text">الموقع: القاعة الكبرى</p>
    </div>
    
    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>
    
    <canvas id="worldCanvas"></canvas>

    <script src="js/World.js"></script>
    <script src="js/arcade.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
