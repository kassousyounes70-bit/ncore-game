<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>N-CORE MMO - القاعة الكبرى</title>
    <script src="https://cdn.jsdelivr.net/npm/colyseus.js@0.15.0/dist/colyseus.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; overflow: hidden;
            touch-action: none; font-family: 'Courier New', Courier, monospace;
            user-select: none; -webkit-user-select: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute; top: 15px; right: 20px;
            color: #66fcf1; text-shadow: 2px 2px 0px #000;
            pointer-events: none; z-index: 100;
        }
        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px;
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(102, 252, 241, 0.05);
            border: 1px solid rgba(102, 252, 241, 0.2);
            z-index: 1000;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; border-radius: 50%;
            background: #66fcf1; box-shadow: 0 0 20px #66fcf1;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1 style="margin:0; font-size: 18px;">N-CORE MMO</h1>
    <p style="margin:0; font-size: 10px; color: #45a29e;">الحالة: متصل | الموقع: القاعة الكبرى</p>
</div>

<div id="joystick-zone">
    <div id="joystick-stick"></div>
</div>

<canvas id="worldCanvas"></canvas>

<script>
    const canvas = document.getElementById('worldCanvas');
    const ctx = canvas.getContext('2d');
    
    // --- 1. إعدادات العالم والأبعاد ---
    const WORLD_WIDTH = 12000;
    const WORLD_HEIGHT = 8000;
    const PIXEL_SIZE = 5;
    
    // المدخل (جهة اليمين)
    const ENTRANCE_X = WORLD_WIDTH;
    const ENTRANCE_Y = WORLD_HEIGHT / 2;
    const DOOR_HEIGHT = 200;

    // نقطة التولد (Spawn Point) - بجانب المدخل دائماً
    const SPAWN_X = WORLD_WIDTH - 400;
    const SPAWN_Y = ENTRANCE_Y;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // الكاميرا
    const camera = { x: SPAWN_X - canvas.width/2, y: SPAWN_Y - canvas.height/2 };

    // --- 2. نظام الأصول والتصادم ---
    const colliders = [];
    const gameStations = [];

    // إضافة حدود العالم (جدران لا يمكن اختراقها)
    colliders.push({ x: 0, y: 0, w: 10, h: WORLD_HEIGHT }); // يسار
    colliders.push({ x: 0, y: 0, w: WORLD_WIDTH, h: 10 }); // أعلى
    colliders.push({ x: 0, y: WORLD_HEIGHT - 10, w: WORLD_WIDTH, h: 10 }); // أسفل
    // الجدار الأيمن (مع فتحة المدخل)
    colliders.push({ x: WORLD_WIDTH - 10, y: 0, w: 10, h: ENTRANCE_Y - DOOR_HEIGHT/2 });
    colliders.push({ x: WORLD_WIDTH - 10, y: ENTRANCE_Y + DOOR_HEIGHT/2, w: 10, h: WORLD_HEIGHT });

    function addStation(type, count, region, w, h) {
        let placed = 0;
        while (placed < count) {
            let x = region.x + Math.random() * region.w;
            let y = region.y + Math.random() * region.h;
            
            // التحقق من عدم التداخل مع منطقة المدخل
            if (x > WORLD_WIDTH - 800 && y > ENTRANCE_Y - 300 && y < ENTRANCE_Y + 300) continue;

            gameStations.push({ x, y, type, w, h, active: false });
            colliders.push({ x, y, w, h });
            placed++;
        }
    }

    // توزيع الأجهزة حسب العدد المطلوب
    addStation('ps1', 35, {x: 500, y: 500, w: 11000, h: 2000}, 80, 100);
    addStation('ps2', 35, {x: 500, y: 3000, w: 11000, h: 2000}, 100, 120);
    addStation('psp', 40, {x: 500, y: 5500, w: 5000, h: 2000}, 50, 40);
    addStation('arcade', 30, {x: 6000, y: 5500, w: 5500, h: 2000}, 120, 180);
    addStation('pc', 30, {x: 1000, y: 1000, w: 10000, h: 6000}, 100, 100);

    // --- 3. منطق اللاعب والتحريك ---
    const player = {
        x: SPAWN_X,
        y: SPAWN_Y,
        vx: 0, vy: 0,
        speed: 7,
        width: 40, height: 60
    };

    function checkCollision(nx, ny) {
        for (let c of colliders) {
            if (nx < c.x + c.w && nx + player.width > c.x && ny < c.y + c.h && ny + player.height > c.y) {
                return true;
            }
        }
        return false;
    }

    // --- 4. الرسم (Rendering) ---
    function drawStatic(x, y, w, h) {
        for (let i = 0; i < w; i += 4) {
            for (let j = 0; j < h; j += 4) {
                ctx.fillStyle = Math.random() > 0.5 ? '#222' : '#444';
                ctx.fillRect(x + i, y + j, 4, 4);
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#0b0c10';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // رسم الأرضية (شبكة)
        ctx.strokeStyle = '#1f2833';
        ctx.lineWidth = 1;
        for (let x = -camera.x % 100; x < canvas.width; x += 100) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = -camera.y % 100; y < canvas.height; y += 100) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // لافتة النيون (تومض وتنطفئ)
        const neonTime = Date.now() * 0.005;
        const isOn = Math.sin(neonTime) > -0.2 && Math.random() > 0.05; 
        if (isOn) {
            ctx.font = 'bold 30px Courier New';
            ctx.fillStyle = '#66fcf1';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#66fcf1';
            ctx.fillText('N·CORE WORLD', ENTRANCE_X - camera.x - 250, ENTRANCE_Y - camera.y - 120);
            ctx.shadowBlur = 0;
        }

        // رسم الأجهزة والتلفازات
        gameStations.forEach(s => {
            const sx = s.x - camera.x;
            const sy = s.y - camera.y;
            if (sx < -200 || sx > canvas.width + 200) return;

            // هيكل الجهاز
            ctx.fillStyle = '#1f2833';
            ctx.fillRect(sx, sy, s.w, s.h);

            // منطق التلفاز: تشويش أو صورة لعبة
            const dist = Math.sqrt((player.x - s.x)**2 + (player.y - s.y)**2);
            if (dist < 150) {
                // رسمة اللعبة (تبسيط حالياً لمربع ملون)
                ctx.fillStyle = '#45a29e';
                ctx.fillRect(sx + 5, sy + 5, s.w - 10, s.h / 2);
            } else {
                drawStatic(sx + 5, sy + 5, s.w - 10, s.h / 2);
            }
        });

        // رسم اللاعب (بدون رأس حالياً كنموذج)
        ctx.fillStyle = '#66fcf1';
        ctx.fillRect(player.x - camera.x, player.y - camera.y, player.width, player.height);
        // تمثيل الرقبة المقطوعة
        ctx.fillStyle = '#1f2833';
        ctx.fillRect(player.x - camera.x + 10, player.y - camera.y, 20, 5);
    }

    function update() {
        if (!checkCollision(player.x + player.vx, player.y)) player.x += player.vx;
        if (!checkCollision(player.x, player.y + player.vy)) player.y += player.vy;

        // تحديث الكاميرا لتتبع اللاعب
        camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
        camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
        
        // منع الكاميرا من الخروج عن حدود العالم
        camera.x = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, camera.x));
        camera.y = Math.max(0, Math.min(WORLD_HEIGHT - canvas.height, camera.y));
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // التحكم باللمس (الجوويستيك)
    const joyStick = document.getElementById('joystick-stick');
    const joyZone = document.getElementById('joystick-zone');
    joyZone.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const rect = joyZone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 50) { dx *= 50/dist; dy *= 50/dist; }
        joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
        player.vx = (dx / 50) * player.speed;
        player.vy = (dy / 50) * player.speed;
    });
    joyZone.addEventListener('touchend', () => {
        joyStick.style.transform = `translate(0, 0)`;
        player.vx = 0; player.vy = 0;
    });

    loop();
</script>
</body>
</html>
